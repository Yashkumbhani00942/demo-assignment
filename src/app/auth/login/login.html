<div class="login-main w-100 vh-100 d-flex flex-column align-items-center justify-content-center">
    <div class="sign-up-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor" class="mb-2 bi bi-terminal" viewBox="0 0 16 16">
            <path d="M6 9a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3A.5.5 0 0 1 6 9M3.854 4.146a.5.5 0 1 0-.708.708L4.793 6.5 3.146 8.146a.5.5 0 1 0 .708.708l2-2a.5.5 0 0 0 0-.708z"/>
            <path d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm12 1a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/>
        </svg>

        <h2 class="title fw-bold mb-1">Welcome back!</h2>
        <p class="sub-title mb-3">Please enter your credentials to sign in!</p>
        <form action="" class="sign-in-form p-5">
            <div class="form-field-group">
                <label for="username" class="d-block fw-bold mb-1">Username</label>
                <input type="text" id="username" class="border-0" placeholder="Username" [formControl]="username">
            </div>
    
            <div class="form-field-group">
                <label for="password" class="d-block fw-bold mb-1">Password</label>
                <input type="password" id="password" class="border-0" placeholder="Password" [formControl]="password">
            </div>
    
            <button type="submit" class="btn mt-2 fw-bold" (click)="signIn()">Sign In</button>
    
        </form>
    </div>
</div>
